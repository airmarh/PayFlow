name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, Unit Tests & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test PayFlow.Tests/PayFlow.Tests.csproj \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage

      - name: Run integration tests
        run: |
          dotnet test PayFlow.Tests.Integration/PayFlow.Tests.Integration.csproj \
            --no-build \
            --configuration Release \
            --verbosity normal
        # Testcontainers pulls the postgres:16-alpine image at runtime — Docker is
        # available on ubuntu-latest runners by default.

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --file PayFlow.API/Dockerfile \
            --tag payflow-api:${{ github.sha }} \
            .
